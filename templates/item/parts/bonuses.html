<div class="bonus-section" data-bonus-path="{{bonusPath}}">
    <div class="bonus-section-header">
        <span>Bonuses</span>
        <button type="button" class="bonus-add"><i class="fas fa-plus"></i> Add</button>
    </div>
    {{#if bonuses.length}}
        {{#each bonuses}}
        <div class="bonus-row" data-bonus-id="{{this.id}}">
            <select class="bonus-type" data-bonus-id="{{this.id}}">
                {{selectOptions @root.mechanicalBonusTypeOptions selected=(mechanicalBonusType this)}}
            </select>
            <input type="text" class="bonus-target-control bonus-target-text" value="{{mechanicalBonusTarget this}}" placeholder="Target (or blank = all)" data-bonus-id="{{this.id}}" />
            <select class="bonus-target-control bonus-stat-target" data-bonus-id="{{this.id}}" aria-label="Stat">
                {{selectOptions @root.mechanicalBonusStatOptions selected=(mechanicalBonusTarget this)}}
            </select>
            <select class="bonus-target-control bonus-defense-target" data-bonus-id="{{this.id}}" aria-label="Defense">
                {{selectOptions @root.mechanicalBonusDefenseOptions selected=(mechanicalBonusTarget this)}}
            </select>
            <select class="bonus-target-control bonus-resistance-target" data-bonus-id="{{this.id}}" aria-label="Resistance damage type">
                {{selectOptions @root.mechanicalBonusDamageTypeOptions selected=(mechanicalBonusTarget this)}}
            </select>
            <select class="bonus-target-control bonus-immunity-target" data-bonus-id="{{this.id}}" aria-label="Immunity">
                {{selectOptions @root.mechanicalBonusImmunityOptions selected=(mechanicalBonusTarget this)}}
            </select>
            <select class="bonus-target-control bonus-absorption-target" data-bonus-id="{{this.id}}" aria-label="Absorption damage type">
                {{selectOptions @root.mechanicalBonusAbsorptionOptions selected=(mechanicalBonusTarget this)}}
            </select>
            <select class="bonus-target-control bonus-vulnerability-target" data-bonus-id="{{this.id}}" aria-label="Vulnerability damage type">
                {{selectOptions @root.mechanicalBonusDamageTypeOptions selected=(mechanicalBonusTarget this)}}
            </select>
            <select class="bonus-target-control bonus-universal-ability-target" data-bonus-id="{{this.id}}" aria-label="Universal ability">
                {{selectOptions @root.mechanicalBonusUniversalAbilityOptions selected=(mechanicalBonusTarget this)}}
            </select>
            <select class="bonus-vulnerability-severity" data-bonus-id="{{this.id}}" aria-label="Vulnerability severity">
                {{selectOptions @root.mechanicalBonusVulnerabilitySeverityOptions selected=(mechanicalBonusSeverity this)}}
            </select>
            <input type="number" class="bonus-value" value="{{this.value}}" data-bonus-id="{{this.id}}" />
            <button type="button" class="bonus-delete" data-bonus-id="{{this.id}}"><i class="fas fa-times"></i></button>
        </div>
        {{/each}}
    {{else}}
        <div class="bonus-empty">No bonuses — click <strong>+ Add</strong> to create one.</div>
    {{/if}}
</div>
